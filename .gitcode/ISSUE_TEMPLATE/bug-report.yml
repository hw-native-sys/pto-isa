name: Bug-Report|缺陷反馈
description: 当您发现了一个缺陷，需要向社区反馈时，请使用此模板。
title: "[Bug-Report|缺陷反馈]: "
labels: ["bug-report"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sending an issue! Please fill in the following template to help quickly solve your problem.
  - type: textarea
    attributes:
      label: 发生了什么问题？
      description: What happened?
    validations:
      required: true

  - type: textarea
    attributes:
      label: 期望的行为是什么？
      description: What is the expected behavior?
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何复现该缺陷？
      description: How can this defect be reproduced?
    validations:
      required: true

  - type: textarea
    attributes:
      label: 环境&版本信息
      description: Environment and Version Information
    validations:
      required: true

  - type: textarea
    attributes:
      label: 其他
      description: Other
