name: Requirement|需求建议
description: 您需要反馈或实现一个新需求时，请使用此模板。
title: "[Requirement|需求建议]: "
labels: ["requirement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sending an requirement! Please fill in the following template to help quickly solve your problem.
  - type: textarea
    attributes:
      label: 应用场景
      description: Application Scenarios
    validations:
      required: true

  - type: textarea
    attributes:
      label: 期望支持的硬件
      description: Expected hardware support.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 期望支持的数据类型、Shape、布局等
      description: Expected support for data types, shapes, layouts, etc.
    validations:
      required: true
