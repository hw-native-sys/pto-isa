name: A5 Smoke

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      device_id:
        description: "task-submit device id, or auto"
        required: false
        default: "auto"
        type: string
      ascend_home_path:
        description: "Override ASCEND_HOME_PATH on the runner"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: >-
    a5-smoke-${{ github.workflow }}-${{
      github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.ref
    }}
  cancel-in-progress: false

jobs:
  smoke:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/a5-smoke') &&
          contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      }}
    runs-on: [self-hosted, a5]
    timeout-minutes: 120

    steps:
      - name: Resolve trigger context
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            const isIssueComment = context.eventName === "issue_comment";
            let repository = `${context.repo.owner}/${context.repo.repo}`;
            let ref = context.ref.replace("refs/heads/", "");
            let sha = context.sha;
            let prNumber = "";

            if (isIssueComment) {
              const pull_number = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
              });

              if (pr.head.repo.full_name !== repository) {
                core.setFailed(
                  `A5 smoke only supports PR branches in ${repository}. ` +
                  `Fork PR ${pr.head.repo.full_name} cannot be scheduled onto the trusted self-hosted A5 runner.`
                );
                return;
              }

              repository = pr.head.repo.full_name;
              ref = pr.head.ref;
              sha = pr.head.sha;
              prNumber = String(pr.number);
            }

            core.setOutput("repository", repository);
            core.setOutput("ref", ref);
            core.setOutput("sha", sha);
            core.setOutput("pr_number", prNumber);

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.trigger.outputs.repository }}
          ref: ${{ steps.trigger.outputs.ref }}
          fetch-depth: 1

      - name: Record trigger summary
        shell: bash
        run: |
          set -euo pipefail
          echo "A5 smoke target repository: ${{ steps.trigger.outputs.repository }}"
          echo "A5 smoke target ref: ${{ steps.trigger.outputs.ref }}"
          echo "A5 smoke target sha: ${{ steps.trigger.outputs.sha }}"
          if [[ -n "${{ steps.trigger.outputs.pr_number }}" ]]; then
            echo "Triggered from PR #${{ steps.trigger.outputs.pr_number }} by comment command /a5-smoke"
          fi

      - name: Resolve runner parameters
        shell: bash
        env:
          INPUT_DEVICE_ID: ${{ github.event.inputs.device_id || '' }}
          INPUT_ASCEND_HOME_PATH: ${{ github.event.inputs.ascend_home_path || '' }}
          DEFAULT_DEVICE_ID: ${{ vars.A5_SMOKE_DEVICE_ID }}
          DEFAULT_ASCEND_HOME_PATH: ${{ vars.A5_SMOKE_ASCEND_HOME_PATH }}
        run: |
          set -euo pipefail

          device_id="${INPUT_DEVICE_ID:-${DEFAULT_DEVICE_ID:-auto}}"
          ascend_home_path="${INPUT_ASCEND_HOME_PATH:-${DEFAULT_ASCEND_HOME_PATH:-}}"

          {
            echo "DEVICE_ID=${device_id}"
            echo "ASCEND_HOME_PATH=${ascend_home_path}"
          } >> "${GITHUB_ENV}"

      - name: Run A5 smoke on self-hosted runner
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./tests/script/run_a5_smoke_ci.sh
          if command -v task-submit >/dev/null 2>&1; then
            task-submit --device "${DEVICE_ID}" --timeout 0 --max-time 0 \
              --run "cd '${GITHUB_WORKSPACE}' && ASCEND_HOME_PATH='${ASCEND_HOME_PATH}' bash ./tests/script/run_a5_smoke_ci.sh" \
              2>&1 | tee ./a5_smoke.log
          else
            ASCEND_HOME_PATH="${ASCEND_HOME_PATH}" bash ./tests/script/run_a5_smoke_ci.sh \
              2>&1 | tee ./a5_smoke.log
          fi

      - name: Upload A5 smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a5_smoke_logs
          path: a5_smoke.log
          if-no-files-found: warn
