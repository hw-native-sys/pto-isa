# typos configuration for pto-isa.
# Suppresses PTO / CANN / Ascend domain terms and intentional short identifiers
# (false positives). Real misspellings in source were fixed; misspelled identifiers
# were renamed. Remaining entries below are legitimate terms, not typos.
[default.extend-words]
nd = "nd"            # ND layout (N-dimensional), e.g. tnd / ND tensor format
cann = "cann"        # Huawei CANN toolkit
subtile = "subtile"  # PTO sub-tile concept
subtiles = "subtiles"
fo = "fo"            # FiFo
adn = "adn"          # MX_ADN microscaling layout
eles = "eles"        # nEles / tmpGapEles (element count)
ands = "ands"        # TAnds instruction
tbe = "tbe"          # TBE (Tensor Boost Engine)
typ = "typ"          # type abbreviation
pn = "pn"            # padded_n
binar = "binar"      # binary abbreviation
alog = "alog"            # ascendalog tool / algorithm-log
mis = "mis"          # mis- prefix (mis-counts, mis-typed)
vitaliy = "vitaliy"  # author name (Vitaliy Manushkin, in Third_Party_Open_Source_Software_Notice)
compatiable = "compatiable"  # external cann-cmake filename version_compatiable.inc — must match dependency spelling

[default.extend-identifiers]
SUBTILE = "SUBTILE"
SUBTILES = "SUBTILES"
