site_name: PTO ISA Manual
site_description: PTO ISA is a multi-target virtual ISA for tile, vector, scalar, and communication operations. Read the programming model, machine model, and grouped instruction reference in one manual.
site_url: https://pto-isa.github.io/
repo_url: https://github.com/PTO-ISA/pto-isa

theme:
  name: readthedocs
  language: en

docs_dir: ../
site_dir: ../../site
exclude_docs: |
  /README.md
  /README_zh.md
  .claude/**
  .codex/**
  AGENTS.md
  CONTRIBUTING.md
  ReleaseNote.md
  SECURITY.md
  SECURITY_zh.md
  all-pages.md
  all-pages_zh.md
  cmake/**
  demos/**
  docs/HL_*.md
  docs/PTOISA.md
  docs/PTOISA_zh.md
  docs/README.md
  docs/README_zh.md
  docs/agent.md
  docs/auto_mode/**
  docs/coding/**
  docs/menu_apis.md
  docs/machine/**
  docs/reference/**
  docs/tools/**
  docs/website.md
  docs/website_zh.md
  include/**
  kernels/**
  manual/**
  scripts/**
  tests/**

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore
    unrecognized_links: ignore
    anchors: ignore

plugins:
  - gen-files:
      scripts:
        - gen_pages.py
  - search

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
      inline_syntax: [dollar, round]
      block_syntax: [dollar, square]

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/nav-collapse.js
  - assets/javascripts/language-switcher.js
  - assets/javascripts/pto-syntax.js
  - assets/javascripts/site-chrome.js
  - assets/javascripts/nav-translator.js

extra_css:
  - assets/stylesheets/custom.css

