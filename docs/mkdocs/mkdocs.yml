site_name: PTO Virtual ISA Architectural Manual
site_url: https://pto-isa.github.io/
repo_url: https://github.com/PTO-ISA/pto-isa

theme:
  name: readthedocs
  language: en

docs_dir: src
site_dir: ../../site

plugins:
  - gen-files:
      scripts:
        - gen_pages.py
  - search

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
      inline_syntax: [dollar, round]
      block_syntax: [dollar, square]

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - assets/javascripts/nav-collapse.js
  - assets/javascripts/nav-translator.js
  - assets/javascripts/language-switcher.js
  - assets/javascripts/chinese-navigation.js

extra_css:
  - assets/stylesheets/custom.css

