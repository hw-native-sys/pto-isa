<text x="56" y="528" class="procTitle">Procedure (conceptual)</text>
<text x="56" y="554" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for each element (i, j) in valid region:</tspan>
  <tspan x="56" dy="16">  if mask[i,j] is true:</tspan>
  <tspan x="56" dy="16">    dst[i,j] = src[i,j]</tspan>
