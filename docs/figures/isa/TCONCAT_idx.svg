<text x="40" y="44" class="title">TCONCAT (Indexed Form)</text>
<text x="40" y="68" class="subtitle">Concatenate with per-row dynamic column counts from index tiles.</text>
<text x="40" y="92" class="meta">API: TCONCAT(dst, src0, src1, src0Idx, src1Idx) or TCONCAT(dst, src0, src1, dstIdx, src0Idx, src1Idx)</text>
<text x="1360" y="92" class="meta" text-anchor="end">Legend: green=src0Idx; purple=src1Idx; yellow=dstIdx</text>
<line x1="36" y1="105" x2="1364" y2="105" stroke="#e2e8f0" stroke-width="1.5" />
<text x="700" y="135" class="subtitle" text-anchor="middle" fill="#515151">dst[r, 0:idx0Num[r]] = src0[r, 0:idx0Num[r]]  |  dst[r, idx0Num[r]:] = src1[r, 0:idx1Num[r]]</text>

