<rect x="40" y="620" width="1320" height="310" class="procBox" />
<text x="56" y="645" class="procTitle">Procedure (indexed form, per-row)</text>
<text x="56" y="670" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for r in range(validRows):</tspan>
  <tspan x="56" dy="18">  # Read dynamic column counts from index tiles (stored as byte counts)</tspan>
  <tspan x="56" dy="18">  idx0Num = *(idx0Ptr + r * idx0Stride) / sizeof(idxType)</tspan>
  <tspan x="56" dy="18">  idx1Num = *(idx1Ptr + r * idx1Stride) / sizeof(idxType)</tspan>
  <tspan x="56" dy="18">  if (dstIdx):</tspan>
  <tspan x="56" dy="18">    dstIdxNum = min(idx0Num + idx1Num, dstValidCol)</tspan>
  <tspan x="56" dy="18">    *(dstIdxPtr + r * dstIdxStride) = dstIdxNum * sizeof(idxType)</tspan>
  <tspan x="56" dy="18">  # Apply same concatenation logic as basic form with row-specific counts</tspan>
  <tspan x="56" dy="18">  sreg0 = min(idx0Num, dstValidCol)</tspan>
  <tspan x="76" dy="0">sreg1 = min(idx1Num, dstValidCol - sreg0)</tspan>
  <tspan x="56" dy="18">  # Phase 1: vlds(src0) → vsts(dst) for sreg0 columns</tspan>
  <tspan x="56" dy="18">  # Phase 2: mem_bar → vlds(src1) → vscatter(dst, offset=sreg0)</tspan>
</text>
<text x="56" y="920" class="meta">Index tiles store byte counts; divide by sizeof(dtype) to get element counts. dstIdx.ValidRow must be 1. idx types: int8/16/32, uint8/16/32.</text>
</svg>