<text x="56" y="528" class="procTitle">Procedure (conceptual)</text>
<text x="56" y="554" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">TPREFETCH_ASYNC(srcGlobal, ctx)</tspan>
  <tspan x="56" dy="16">1) Build SDMA CMO prefetch metadata from srcGlobal.</tspan>
  <tspan x="56" dy="16">2) Submit async prefetch into L2 cache.</tspan>
  <tspan x="56" dy="16">3) Return AsyncEvent; consumers wait before dependent TLOAD.</tspan>
</text>
<text x="56" y="680" class="meta">Note: semantics apply to the valid region unless stated otherwise.</text>
