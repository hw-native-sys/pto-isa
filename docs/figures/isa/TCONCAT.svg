<rect x="40" y="490" width="1120" height="310" class="procBox" />
<text x="56" y="514" class="procTitle">Procedure (per-row, A5 implementation)</text>
<text x="56" y="538" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for r in range(validRows):</tspan>
  <tspan x="56" dy="16">  # Phase 1: Copy src0 to dst left part (vlds → vsts)</tspan>
  <tspan x="56" dy="16">  for j in range(ceil(C0 / elementsPerRepeat)):</tspan>
  <tspan x="56" dy="16">    preg = CreatePredicate(remainingCols0)</tspan>
  <tspan x="56" dy="16">    vlds(vreg_0, src0, row*r + j*repeat)  # load src0 chunk</tspan>
  <tspan x="56" dy="16">    vsts(vreg_0, dst, row*r + j*repeat)   # store to dst same position</tspan>
  <tspan x="56" dy="16">  mem_bar(VST_VLD)  # barrier: ensure vsts completes before vscatter</tspan>
  <tspan x="56" dy="16">  # Phase 2: Copy src1 to dst right part at offset C0 (vlds → vscatter)</tspan>
  <tspan x="56" dy="16">  for j in range(ceil(C1 / elementsPerRepeat)):</tspan>
  <tspan x="56" dy="16">    preg = CreatePredicate(remainingCols1)</tspan>
  <tspan x="56" dy="16">    vlds(vreg_1, src1, row*r + j*repeat)</tspan>
  <tspan x="56" dy="16">    vci(vreg_idx, C0 + r*stride + j*repeat)  # generate scatter indices</tspan>
  <tspan x="56" dy="16">    vscatter(vreg_1, dst, vreg_idx, preg)    # scatter to dst at offset</tspan>
</text>
<text x="56" y="790" class="meta">Constraints: Row-major layout required; validRows(src0)=validRows(src1)=validRows(dst); validColsDst=validCols0+validCols1</text>
</svg>