<text x="40" y="44" class="title">TCONCAT (Basic Form)</text>
<text x="40" y="68" class="subtitle">Concatenate two tiles horizontally. TCONCAT(dst, src0, src1)</text>
<text x="40" y="88" class="meta">API: 3 arguments - dst, src0, src1. ValidCols must match: dst.Cv = src0.Cv + src1.Cv</text>
<text x="1160" y="88" class="meta" text-anchor="end">Legend: blue=src0; orange=src1; dashed=valid region; shaded=masked/padding</text>
<line x1="36" y1="100" x2="1164" y2="100" stroke="#e2e8f0" stroke-width="1.5" />
<text x="600" y="130" class="subtitle" text-anchor="middle" fill="#515151">dst[r, 0:validCols0] = src0[r, :]   dst[r, validCols0:validColsDst] = src1[r, :]</text>

