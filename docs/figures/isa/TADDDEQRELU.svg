<text x="600" y="342" class="opText" font-size="10px" text-anchor="middle">ADD+DEQ+RELU</text>

<!-- Arrows from src0, deqScale, src1 to op box -->
<path d="M 410 312 L 410 338 L 530 338" class="arrow" stroke="#2D5BCE" marker-end="url(#arrow)" />
