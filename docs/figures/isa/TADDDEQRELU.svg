<!-- dst tile (half) -->
<text x="600" y="388" class="tileLabel" text-anchor="middle">dst</text>
<text x="600" y="402" class="typeLabel" text-anchor="middle">half</text>
<rect x="545" y="410" width="110" height="110" class="tileBorder" />
<rect x="545" y="410" width="22" height="22" class="cell" />
<rect x="567" y="410" width="22" height="22" class="cell" />
