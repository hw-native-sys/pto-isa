<text x="549" y="494" class="axisText">Rv</text>
<text x="629" y="422" class="axisText" text-anchor="end">Cv</text>
<path d="M 555 420 L 589 420" class="axisLine" marker-end="url(#axisArrow)" />
<path d="M 555 420 L 555 454" class="axisLine" marker-end="url(#axisArrow)" />
<text x="593" y="424" class="axisText">c</text>
<text x="553" y="458" class="axisText" text-anchor="end">r</text>

<!-- Procedure box -->
<rect x="40" y="548" width="1120" height="148" class="procBox" />
<text x="56" y="574" class="procTitle">Procedure (conceptual)</text>
<text x="56" y="600" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">for r in 0..Rv-1:</tspan>
  <tspan x="56" dy="16">  for c in 0..Cv-1:</tspan>
  <tspan x="56" dy="16">    sum = int32(src0[r,c]) + int32(src1[r,c])</tspan>
  <tspan x="56" dy="16">    scaled = float(sum) * deqScale          // precision-compensated: (sum >> 17) * deqScale
</tspan>
</text>
<text x="56" y="668" class="procText" xml:space="preserve">
  <tspan x="56" dy="0">    dst[r,c] = half(max(0, scaled))</tspan>
</text>
<text x="56" y="686" class="meta">Note: src0, src1 are int32; dst is half. Precision-compensated scaling avoids float32 precision loss for large int32 values.</text>
</svg>
